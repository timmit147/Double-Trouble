<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Double Trouble</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c96e;
  --cream: #f5f0e8;
  --red: #c0392b;
  --dark: #0d1a12;
  --green-deep: #1a3d27;
  --card-w: 108px;
  --card-h: 152px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--cream); overflow: hidden; }
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 20px; position: absolute; inset: 0; overflow-y: auto; }
.screen.active { display: flex; }
.logo-wrap { text-align: center; margin-bottom: 10px; position: relative; z-index: 1; }
.logo-wrap h1 { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 55%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo-wrap .tagline { font-size: 10px; letter-spacing: 5px; color: rgba(201,168,76,.45); text-transform: uppercase; margin-top: 4px; }
.lcard { background: rgba(255,255,255,.04); border: 1px solid rgba(201,168,76,.2); border-radius: 18px; padding: 18px 20px; width: 100%; max-width: 340px; position: relative; z-index: 1; }
.lcard h3 { font-family: 'Playfair Display', serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
.name-input { width: 100%; background: rgba(0,0,0,.4); border: 1.5px solid rgba(201,168,76,.25); border-radius: 10px; padding: 11px 13px; color: var(--cream); font-size: 15px; outline: none; }
.name-input:focus { border-color: var(--gold); }
.name-input::placeholder { color: rgba(255,255,255,.22); }
.btn-big { width: 100%; padding: 15px; border-radius: 13px; border: none; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: transform .15s, filter .15s; }
.btn-big:active { transform: scale(.97); }
.btn-big.gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); box-shadow: 0 6px 20px rgba(201,168,76,.32); }
.btn-big.gold:hover { filter: brightness(1.1); }
.btn-g { background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold)); background-size: 200%; color: var(--dark); border: none; border-radius: 10px; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; padding: 11px 16px; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 14px rgba(201,168,76,.28); transition: transform .15s, filter .15s; }
.btn-g:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-g:active { transform: scale(.97); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s; backdrop-filter: blur(5px); }
.overlay.show { opacity: 1; pointer-events: all; }
.mbox { background: linear-gradient(160deg, #1a3a28, #0d1f17); border: 1.5px solid rgba(201,168,76,.32); border-radius: 20px; padding: 28px 24px; width: 90%; max-width: 330px; position: relative; transform: scale(.9); transition: transform .3s; box-shadow: 0 28px 70px rgba(0,0,0,.6); }
.overlay.show .mbox { transform: scale(1); }
.mbox h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 20px; margin-bottom: 12px; letter-spacing: 1px; }
.mbox p { color: rgba(245,240,232,.8); font-size: 13px; line-height: 1.7; }
.mcl { position: absolute; top: 13px; right: 14px; background: none; border: none; color: var(--gold); font-size: 19px; cursor: pointer; opacity: .55; }
.mcl:hover { opacity: 1; }
</style>
</head>
<body>
<div class="screen active" id="lobbyScreen">
  <div class="logo-wrap">
    <h1>Double Trouble</h1>
    <div class="tagline">Kaartspel</div>
  </div>
  <div class="lcard">
    <h3>Jouw naam</h3>
    <input class="name-input" id="nameInput" placeholder="Voer je naam in…" maxlength="16">
  </div>
  <div class="lcard">
    <h3>Solo spelen</h3>
    <button class="btn-big gold" onclick="startSolo()">Speel alleen</button>
  </div>
</div>
<div class="screen" id="gameScreen">
  <div class="g-inner">
    <div class="topbar">
      <div class="g-title">Double Trouble</div>
      <button class="icon-btn" onclick="showInfo()">⚙️</button>
    </div>
  </div>
</div>
<div class="overlay" id="infoModal">
  <div class="mbox">
    <button class="mcl" onclick="hideInfo()">✕</button>
    <h2>Info & Instellingen</h2>
    <p>Blijf kaarten trekken of stop. Dubbele kaarten tellen niet mee.</p>
    <p>Ronde eindigt als iedereen stopt of niet meer kan spelen.</p>
    <p>Spel stopt als iemand meer dan 200 punten heeft.</p>
    <button class="btn-big gold" onclick="toggleFullscreen()">Volledig scherm</button>
  </div>
</div>
<script>
function showInfo() { document.getElementById('infoModal').classList.add('show'); }
function hideInfo() { document.getElementById('infoModal').classList.remove('show'); }
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else if (document.exitFullscreen) document.exitFullscreen();
}
</script>
</body>
</html>
