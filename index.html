<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Trouble</title>
<style>
body { font-family: Arial; text-align:center; background:#0f172a; color:white; }
button { padding:10px 16px; margin:6px; border-radius:10px; border:none; cursor:pointer; }
.hidden { display:none; }
.card { display:inline-block; padding:20px; margin:10px; background:white; color:black; border-radius:12px; font-size:24px; }
.topbar { position:fixed; top:10px; right:10px; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; }
.modal-content { background:#1e293b; padding:20px; border-radius:12px; max-width:400px; }
.big { font-size:28px; margin-top:20px; }
</style>
</head>
<body>

<div class="topbar">
  <button onclick="openSettings()">⚙️</button>
</div>

<h1>Double Trouble</h1>

<div id="setup">
  <h2>Spelers toevoegen</h2>
  <input id="playerName" placeholder="Naam">
  <button onclick="addPlayer()">Toevoegen</button>
  <div id="playerList"></div>
  <button onclick="startGame()">Start spel</button>
</div>

<div id="game" class="hidden">
  <h2 id="currentPlayer"></h2>
  <div id="cards"></div>
  <div id="score"></div>
  <button onclick="drawCard()">Trek kaart</button>
  <button onclick="stopTurn()">Stop beurt</button>
</div>

<div id="roundEnd" class="hidden">
  <h2>Ronde klaar</h2>
  <div id="roundScores"></div>
  <button onclick="nextRound()">Volgende ronde</button>
</div>

<div id="gameEnd" class="hidden">
  <h2>Spel afgelopen</h2>
  <div id="winner"></div>
  <button onclick="location.reload()">Opnieuw spelen</button>
</div>

<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h2>Instellingen</h2>
    <button onclick="toggleFullscreen()">Fullscreen</button>
    <button onclick="showInfo()">Info</button>
    <button onclick="closeSettings()">Sluiten</button>
  </div>
</div>

<div id="infoModal" class="modal hidden">
  <div class="modal-content">
    <h2>Info</h2>
    <p>Blijf kaarten trekken of stop. Dubbele kaarten tellen niet mee. Ronde eindigt als iedereen stopt of niet meer kan. Spel stopt als iemand > 200 punten heeft.</p>
    <button onclick="closeInfo()">Sluiten</button>
  </div>
</div>

<script>
let players = [];
let scores = {};
let roundScores = {};
let current = 0;
let currentCards = {};
let stopped = {};
let deck = [];
let discard = [];
let maxScore = 200;

function createDeck() {
  deck = [];
  for(let i=0;i<=12;i++) {
    for(let j=0;j<4;j++) deck.push(i);
  }
  shuffle(deck);
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}

function drawFromDeck() {
  if(deck.length === 0) {
    deck = [...discard];
    discard = [];
    shuffle(deck);
  }
  return deck.pop();
}

function addPlayer() {
  const name = document.getElementById('playerName').value;
  if(!name) return;
  players.push(name);
  scores[name] = 0;
  roundScores[name] = 0;
  currentCards[name] = currentCards[name] || [];
  stopped[name] = false;
  document.getElementById('playerName').value = '';
  renderPlayers();
}

function renderPlayers() {
  document.getElementById('playerList').innerText = players.join(', ');
}

function startGame() {
  createDeck();
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  showPlayer();
}

function showPlayer() {
  const p = players[current];
  document.getElementById('currentPlayer').innerText = p;
  renderCards(p);
  updateScore();
}

function drawCard() {
  const p = players[current];
  if(stopped[p]) return;
  const card = drawFromDeck();
  currentCards[p].push(card);
  renderCards(p);
}

function renderCards(p) {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  currentCards[p].forEach(c => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerText = c;
    container.appendChild(el);
  });
}

function stopTurn() {
  const p = players[current];
  if(stopped[p]) return;

  const counts = {};
  currentCards[p].forEach(c => counts[c] = (counts[c]||0)+1);

  let sum = 0;
  for(let c in counts) {
    if(counts[c] === 1) sum += parseInt(c);
  }

  roundScores[p] = sum;
  scores[p] += sum;
  stopped[p] = true;

  discard.push(...currentCards[p]);

  nextPlayerAuto();
}

function nextPlayerAuto() {
  setTimeout(() => {
    if(checkRoundEnd()) return;
    do {
      current = (current + 1) % players.length;
    } while(stopped[players[current]]);
    showPlayer();
  }, 2000);
}

function checkRoundEnd() {
  const allStopped = players.every(p => stopped[p]);
  if(!allStopped) return false;

  document.getElementById('game').classList.add('hidden');
  document.getElementById('roundEnd').classList.remove('hidden');

  let text = '';
  players.forEach(p => {
    text += p + ': +' + roundScores[p] + ' (totaal: ' + scores[p] + ')\n';
  });
  document.getElementById('roundScores').innerText = text;

  const loser = players.find(p => scores[p] > maxScore);
  if(loser) {
    document.getElementById('roundEnd').classList.add('hidden');
    document.getElementById('gameEnd').classList.remove('hidden');
    document.getElementById('winner').innerText = loser + ' verliest!';
  }

  return true;
}

function nextRound() {
  document.getElementById('roundEnd').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');

  players.forEach(p => {
    stopped[p] = false;
    roundScores[p] = 0;
    // BELANGRIJK: kaarten blijven behouden (geen reset)
  });

  current = 0;
  showPlayer();
}

function updateScore() {
  let text = '';
  players.forEach(p => {
    text += p + ': ' + scores[p] + ' | ';
  });
  document.getElementById('score').innerText = text;
}

function openSettings() {
  document.getElementById('settingsModal').classList.remove('hidden');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.add('hidden');
}
function showInfo() {
  document.getElementById('infoModal').classList.remove('hidden');
}
function closeInfo() {
  document.getElementById('infoModal').classList.add('hidden');
}
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
