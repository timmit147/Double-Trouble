<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Trouble</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}h1 { margin-bottom: 10px; }

.card { width: 120px; height: 160px; background: white; color: black; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.2s ease; }

.card.flip { transform: rotateY(180deg) scale(1.1); }

.score { font-size: 20px; margin-bottom: 10px; }

.history { display: flex; gap: 8px; flex-wrap: wrap; max-width: 300px; justify-content: center; margin-bottom: 20px; }

.history div { background: rgba(255,255,255,0.2); padding: 6px 10px; border-radius: 8px; }

button { padding: 15px 30px; font-size: 18px; border-radius: 12px; border: none; background: #00e676; color: black; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

button:active { transform: scale(0.95); }

</style>
</head>
<body><h1>Double Trouble</h1><div class="card" id="card">?</div>
<div class="score">Score: <span id="score">0</span></div><div class="history" id="history"></div><button onclick="drawCard()">Draw Card</button>

<script>
let drawnCards = [];
let score = 0;

function drawCard() {
    const cardEl = document.getElementById("card");
    cardEl.classList.remove("flip");

    setTimeout(() => {
        let card = Math.floor(Math.random() * 12) + 1;
        cardEl.innerText = card;
        cardEl.classList.add("flip");

        if (drawnCards.includes(card)) {
            setTimeout(() => {
                alert("💥 Double! You lose!");
                drawnCards = [];
                score = 0;
                updateUI();
            }, 200);
        } else {
            drawnCards.push(card);
            score++;
            updateUI();
        }
    }, 100);
}

function updateUI() {
    document.getElementById("score").innerText = score;

    const historyEl = document.getElementById("history");
    historyEl.innerHTML = "";

    drawnCards.forEach(c => {
        const el = document.createElement("div");
        el.innerText = c;
        historyEl.appendChild(el);
    });
}
</script></body>
</html>
